services:
  jenkins:
    build:
      context: ./jenkins
    container_name: local-pipeline-jenkins
    # Docker Desktop's mounted socket is root-owned on this Mac. Running the
    # local coursework controller as root lets Jenkins invoke the host daemon.
    user: root
    restart: unless-stopped
    ports:
      - "8080:8080"
      - "50000:50000"
    volumes:
      - jenkins_home:/var/jenkins_home
      # This is Docker-outside-of-Docker: Jenkins uses Docker Desktop's daemon.
      - /var/run/docker.sock:/var/run/docker.sock

volumes:
  jenkins_home:
