name: Build submission report PDF

on:
  workflow_dispatch:
  push:

permissions:
  contents: read

jobs:
  render-report:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PDF renderer
        run: python -m pip install --upgrade pip reportlab

      - name: Generate submission report PDF
        run: python tools/generate_submission_pdf.py

      - name: Upload report PDF
        uses: actions/upload-artifact@v4
        with:
          name: automated-deployment-pipeline-submission-report
          path: outputs/pdf/automated-deployment-pipeline-submission-report.pdf
          if-no-files-found: error
